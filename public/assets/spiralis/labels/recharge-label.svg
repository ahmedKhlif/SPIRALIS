<svg xmlns="http://www.w3.org/2000/svg" width="600" height="1100" viewBox="0 0 600 1100">
  <defs>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer>
      <feBlend mode="multiply" in="SourceGraphic" in2="noise"/>
    </filter>
    <style>
      .brand{font-family: Georgia, 'Times New Roman', serif; font-size:72px; letter-spacing:12px; fill:#173A2A; text-anchor:middle;}
      .mid{font-family: Arial, Helvetica, sans-serif; font-size:38px; font-weight:600; letter-spacing:2px; fill:#173A2A; text-anchor:middle;}
      .small{font-family: Arial, Helvetica, sans-serif; font-size:34px; font-weight:500; letter-spacing:2px; fill:#173A2A; text-anchor:middle;}
      .vol{font-family: Arial, Helvetica, sans-serif; font-size:38px; fill:#173A2A; text-anchor:middle;}
    </style>
  </defs>
  <rect x="35" y="35" width="530" height="1030" rx="42" fill="#F8F2E8" stroke="#D9CBB6" stroke-width="2" filter="url(#paperNoise)"/>
  <text x="300" y="205" class="brand">SPIRALIS</text><path d="M370 242 C405 220,435 220,470 242 C440 235,410 235,380 252" fill="none" stroke="#173A2A" stroke-width="10" stroke-linecap="round"/>
  <text x="300" y="390" class="mid">RECHARGE</text><text x="300" y="450" class="mid">CRÈME HYDRATANTE</text><text x="300" y="510" class="mid">ANTI-IMPERFECTIONS</text>
  <text x="300" y="565" class="small">SPIRULINE</text>
  <text x="300" y="625" class="small">+ NIACINAMIDE</text>
  <text x="300" y="685" class="small">+ ZINC PCA</text>
  <path d="M300 755 m-45 0 a45 45 0 1 0 90 0 a45 45 0 1 0 -90 0 M300 755 m-25 0 a25 25 0 1 0 50 0 a25 25 0 1 0 -50 0 M300 755 m-8 0 a8 8 0 1 0 16 0" fill="none" stroke="#173A2A" stroke-width="7" stroke-linecap="round"/><path d="M347 718 C370 715,382 725,383 744" fill="none" stroke="#173A2A" stroke-width="7" stroke-linecap="round"/>
  <text x="300" y="965" class="vol">50 ml</text>
</svg>