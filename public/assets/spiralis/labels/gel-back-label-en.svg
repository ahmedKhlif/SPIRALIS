<svg xmlns="http://www.w3.org/2000/svg" width="620" height="1100" viewBox="0 0 620 1100">
  <defs><filter id="paperNoise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="9"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.06"/></feComponentTransfer></filter><style>.h{font-family:Arial,Helvetica,sans-serif;font-size:28px;font-weight:700;fill:#173A2A}.p{font-family:Arial,Helvetica,sans-serif;font-size:23px;fill:#173A2A}.s{font-family:Arial,Helvetica,sans-serif;font-size:20px;fill:#173A2A}.box{fill:none;stroke:#173A2A;stroke-width:2}</style></defs>
  <rect x="45" y="35" width="530" height="1030" rx="34" fill="#F8F2E8" stroke="#D9CBB6" stroke-width="2" filter="url(#paperNoise)"/><rect x="75" y="70" width="470" height="960" rx="18" class="box"/>
  <text x="95" y="130" class="h">BLEMISH-CARE CLEANSING GEL</text>
  <text x="95" y="178" class="p">Purifying cleansing gel that helps gently cleanse skin,</text><text x="95" y="210" class="p">unclog pores, and reduce the appearance of blemishes.</text><text x="95" y="242" class="p">Suitable for combination to oily skin.</text>
  <text x="95" y="315" class="h">DIRECTIONS</text><text x="95" y="363" class="p">Apply to damp skin, massage gently, then rinse with</text><text x="95" y="395" class="p">clean water. Use morning and evening.</text>
  <text x="95" y="470" class="h">PRECAUTIONS</text><text x="95" y="518" class="p">External use only. Avoid contact with eyes. If irritation</text><text x="95" y="550" class="p">occurs, discontinue use. Keep out of reach of children.</text>
  <text x="95" y="655" class="h">INGREDIENTS (INCI)</text><text x="95" y="703" class="s">Aqua, Centella Asiatica Extract, Hydroxyethylcellulose,</text><text x="95" y="732" class="s">Propanediol, Niacinamide, Zinc PCA, Panthenol,</text><text x="95" y="761" class="s">Salicylic Acid, Spirulina Platensis Extract, Decyl Glucoside.</text>
  <line x1="95" y1="870" x2="525" y2="870" stroke="#173A2A" stroke-width="2"/><text x="95" y="915" class="s">Made by: Laboratoire PIPCOS</text><text x="95" y="948" class="s">Made in Tunisia</text><text x="95" y="982" class="s">Batch no.: ____________</text><text x="95" y="1014" class="s">Ref.: ______________</text>
  <rect x="330" y="910" width="85" height="85" class="box"/><text x="372" y="948" class="s" text-anchor="middle">QR</text><text x="372" y="976" class="s" text-anchor="middle">CODE</text><rect x="435" y="910" width="85" height="85" class="box"/><text x="477" y="955" class="s" text-anchor="middle">BAR</text><text x="477" y="980" class="s" text-anchor="middle">CODE</text>
</svg>
